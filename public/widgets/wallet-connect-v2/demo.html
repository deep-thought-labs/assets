<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Demo Wallet Connect v2 (CROC) – Oficial</title>
  <style>body { font-family: system-ui; padding: 20px; }</style>
</head>
<body>
  <h1>Wallet Connect v2 (CROC) Demo</h1>
  <button id="connectBtn">Connect Wallet</button>
  <pre id="status">Estado: esperando...</pre>

  <!-- El widget -->
  <script src="wallet-connect-v2.js" data-network="mainnet"></script>
  <!-- Cambia a data-network="testnet" para probar la otra red -->

  <script>
    const btn = document.getElementById('connectBtn');
    const statusEl = document.getElementById('status');

    // Escuchar cambios en tiempo real (incluye cambio manual en MetaMask)
    DriveWalletV2.on('stateChange', (state) => {
      statusEl.textContent = JSON.stringify(state, null, 2);
      console.log('DriveWalletV2 → stateChange', state);
    });

    btn.addEventListener('click', async () => {
      try {
        const state = await DriveWalletV2.connect();
        console.log('✅ Conectado', state);
      } catch (err) {
        console.error('❌ Error', err);
      }
    });
  </script>
</body>
</html>
