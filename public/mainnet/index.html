<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mainnet — Project 42</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%2342a5f5'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-family='sans-serif'>42</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-network="mainnet">
  <div id="network-page-root"></div>
  <script>
    (function () {
      var root = document.getElementById('network-page-root');
      function loadPage() {
        fetch('../templates/network-page')
          .then(function (r) { return r.text(); })
          .then(function (html) {
            root.innerHTML = html;
            ['../js/copy-command-modal.js', '../js/network-page.js'].forEach(function (src) {
              var s = document.createElement('script');
              s.src = src;
              document.body.appendChild(s);
            });
          });
      }
      loadPage();
      window.addEventListener('pageshow', function (e) {
        if (e.persisted) loadPage();
      });
    })();
  </script>
</body>
</html>
